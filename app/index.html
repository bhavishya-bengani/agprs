<!DOCTYPE html>
<html>
<head>
    <title>AGPRS Dashboard</title>
</head>
<body>
    <h1>AGPRS Dashboard</h1>

    <label>Available Cash (₹): </label>
    <input type="number" id="cash" value="10000">

    <br><br>

    <button onclick="showCash()">Update</button>

    <h2 id="result"></h2>

    <script>
        function showCash() {
            let cash = document.getElementById("cash").value;
            document.getElementById("result").innerHTML =
                "Available Cash: ₹" + cash;
        }
    </script>
</body>
</html>
